<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokéCatálogo | Catálogo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-bg">
    <header class="container header">
      <a href="index.html" class="brand">
        <span class="brand-icon">◆</span>
        <span>PokéCatálogo</span>
      </a>

      <form class="search-form" id="searchForm">
        <div class="form-group">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="icon-search">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
          </svg>
          <input id="searchInput" class="input" type="search" placeholder="Buscar Pokémon">
        </div>
        <button class="btn-search" type="submit">Buscar</button>
      </form>
    </header>

    <section class="container hero-catalog">
      <div>
        <p class="eyebrow">Primeira geração</p>
        <h1>Catálogo Pokémon</h1>
        <p>Pesquise, visualize tipos e abra a página de detalhes de cada Pokémon.</p>
      </div>
      <a class="btn secondary" href="index.html">Voltar ao início</a>
    </section>

    <main id="pokemonList" class="card-list-pokemon container"></main>
    <p id="emptyState" class="empty-state container" hidden>Nenhum Pokémon encontrado.</p>
  </div>

  <script src="js/pokemon-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
